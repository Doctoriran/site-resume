<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff7b00" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff0033" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb703"/>
      <stop offset="50%" stop-color="#fb5607"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#g1)"/>
  <!-- Crown -->
  <g transform="translate(262,140) scale(1.2)" filter="url(#glow)">
    <path d="M80 170 L170 40 L260 170 L350 40 L440 170 L440 220 L80 220 Z" fill="none" stroke="url(#stroke)" stroke-width="16"/>
    <circle cx="170" cy="40" r="12" fill="#ffd166"/>
    <circle cx="350" cy="40" r="12" fill="#ffd166"/>
  </g>
  <!-- M Monogram -->
  <g transform="translate(150,300)">
    <path d="M60 420 L60 0 L160 200 L260 0 L360 200 L460 0 L460 420" fill="none" stroke="url(#stroke)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
  <!-- Subtitle -->
  <g transform="translate(180,880)">
    <text x="0" y="0" font-size="64" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica">MEHRAD — Broken inside, building outside</text>
  </g>
</svg>
